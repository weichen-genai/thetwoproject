<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Owner — Chapter 7: The Confident Error</title>
    <link rel="alternate" type="application/json+oembed" href="https://thetwoproject.com/oembed/ch7.json" title="The Owner — Chapter 7: The Confident Error">
    <script async src="https://plausible.io/js/pa-7a8gF1ZVN_QGPx2doBvLg.js"></script>
    <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init({ autoCapturePageviews: false })
    </script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: transparent;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .player-container {
            width: 100%; height: 100%;
            display: flex; align-items: center;
            box-sizing: border-box; background-color: transparent;
            gap: 6px; padding: 0 10px;
        }
        audio { flex: 1; min-width: 0; height: 54px; outline: none; }
        .speed-select {
            flex-shrink: 0; border: 1px solid #ccc; background: #f5f5f5;
            border-radius: 4px; padding: 4px 6px; font-size: 12px;
            font-family: inherit; color: #444; cursor: pointer; outline: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <audio id="audio-player" controls preload="metadata"
               src="https://theowner-audio.s3.us-east-2.amazonaws.com/The_Owner_Chapter_7.mp3">
            Your browser does not support the audio element.
        </audio>
        <select id="speed-select" class="speed-select" aria-label="Playback speed">
            <option value="1" selected>1&times;</option>
            <option value="1.1">1.1&times;</option>
            <option value="1.25">1.25&times;</option>
            <option value="1.5">1.5&times;</option>
        </select>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audioPlayer = document.getElementById('audio-player');
            const chapter = '7';
            const type = 'gitbook';
            const props = { chapter, type };
            const track = (eventName) => {
                if (typeof window.plausible !== 'function') return;
                window.plausible(eventName, { props });
            };
            document.getElementById('speed-select').addEventListener('change', function () {
                const rate = parseFloat(this.value);
                if (!isNaN(rate)) audioPlayer.playbackRate = rate;
            });
            let audioPlaySent = false;
            audioPlayer.addEventListener('play', () => {
                if (audioPlaySent) return;
                audioPlaySent = true;
                track('Audio Play');
            });
            audioPlayer.addEventListener('ended', () => {
                track('Audio Complete');
                if (window.parent !== window) {
                    try { window.parent.postMessage({ type: 'twoproject-audio-ended', chapter }, '*'); } catch (e) {}
                }
            });
        });
    </script>
</body>
</html>
