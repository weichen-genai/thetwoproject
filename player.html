<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <!-- Same Plausible site script as main pages; no pageview in iframe (audio events only) -->
    <script async src="https://plausible.io/js/pa-7a8gF1ZVN_QGPx2doBvLg.js"></script>
    <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init({ autoCapturePageviews: false })
    </script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .player-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            background-color: transparent;
        }
        audio {
            width: 100%;
            max-width: 100%;
            height: 54px; /* Standard browser default */
            outline: none;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <audio id="audio-player" controls preload="metadata">
            Your browser does not support the audio element.
        </audio>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const src = urlParams.get('src');
            const chapter = urlParams.get('chapter');
            const type = urlParams.get('type');

            const audioPlayer = document.getElementById('audio-player');

            if (src) {
                audioPlayer.src = src;
            } else {
                console.warn("No audio source provided. Expected usage: ?src=URL");
            }

            const props = {
                chapter: chapter && chapter.length ? chapter : 'none',
                type: type && type.length ? type : 'none'
            };

            const track = (eventName) => {
                if (typeof window.plausible !== 'function') return;
                window.plausible(eventName, { props: props });
            };

            let audioPlaySent = false;

            audioPlayer.addEventListener('play', () => {
                if (audioPlaySent) return;
                audioPlaySent = true;
                track('Audio Play');
            });

            audioPlayer.addEventListener('ended', () => {
                track('Audio Complete');
            });
        });
    </script>
</body>
</html>
